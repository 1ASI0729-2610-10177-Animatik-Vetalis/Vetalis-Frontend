<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <mat-icon>pets</mat-icon>
    </div>
    <div class="logo-text">
      <span class="logo-title">Vetalis Pro</span>
      <span class="logo-subtitle">{{ 'sidebar.systemName' | translate }}</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    @for (item of navItems(); track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="nav-item--active"
        class="nav-item"
        matRipple>
        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        <span class="nav-label">{{ item.labelKey | translate }}</span>
      </a>
    }
  </nav>

  <!-- Language switcher -->
  <div class="lang-switcher">
    <button
      class="lang-btn"
      [class.lang-active]="currentLang() === 'es'"
      (click)="switchLang('es')">
      ES
    </button>
    <button
      class="lang-btn"
      [class.lang-active]="currentLang() === 'en'"
      (click)="switchLang('en')">
      EN
    </button>
  </div>

  <!-- User profile -->
  <div class="sidebar-user">
    <div class="user-avatar" [style.background]="user()?.avatarColor || '#E0F2FE'">
      <span class="user-initials">{{ initials() }}</span>
    </div>
    <div class="user-info">
      <span class="user-name">{{ fullName() || 'Vetalis Pro' }}</span>
      <span class="user-role">{{ roleLabel() }}</span>
    </div>
    <button class="user-menu-btn" (click)="logout()" [title]="'auth.logout' | translate">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</aside>
